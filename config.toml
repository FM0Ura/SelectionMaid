# SelectionMaid configuration
# All keys are optional — omitting a key uses the hardcoded default (D-38).

[filter]
# Minimum number of repetitions for a short line to be treated as header/footer (D-34)
min_repeat = 3
# Maximum character length for a header/footer candidate line (D-32)
max_line_len = 80

[chunker]
# Maximum token budget per chunk for the fixed-size fallback strategy (D-51)
# Also used as the section-subdivision limit for heading-based chunking (D-48)
max_tokens = 512

[http]
# Maximum file size accepted by POST /ingest in bytes (D-79, D-90)
# Default: 52_428_800 = 50 MB
max_file_bytes = 52428800
# MIME types accepted by POST /ingest (D-80, D-90)
# v1: PDF, DOCX, HTML only
allowed_mime_types = [
    "application/pdf",
    "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
    "text/html",
]
